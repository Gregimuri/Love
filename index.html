<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Для тебя 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffe6f0 0%, #fbc4d5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            padding: 16px;
            position: relative;
            overflow: hidden;
            touch-action: pan-x pan-y; /* разрешаем скролл, но жесты обрабатываем */
        }

        /* Главная карточка */
        .card {
            background: rgba(255, 250, 245, 0.92);
            backdrop-filter: blur(16px);
            border-radius: 56px;
            padding: 1.8rem 1.5rem;
            max-width: 460px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.6);
            transition: transform 0.2s ease;
            animation: gentleFloat 4s infinite ease-in-out;
            z-index: 15;
            position: relative;
        }

        @keyframes gentleFloat {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }

        .heart-icon {
            font-size: 4rem;
            display: inline-block;
            animation: pulse 1.4s infinite;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.1));
            margin-bottom: 6px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #d43f6b, #f06292);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }

        .compliment-box {
            font-size: 1.2rem;
            line-height: 1.45;
            color: #9b4b6b;
            background: #fff0f5;
            padding: 12px 18px;
            border-radius: 60px;
            margin: 18px 0;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05), 0 2px 6px rgba(0,0,0,0.05);
        }

        .counter {
            background: rgba(255, 215, 225, 0.7);
            border-radius: 40px;
            padding: 8px 16px;
            display: inline-flex;
            align-items: baseline;
            gap: 8px;
            font-weight: 600;
            margin: 6px 0 8px;
            font-size: 1rem;
            color: #b3436b;
        }

        .counter span {
            font-size: 1.7rem;
            font-weight: 800;
            color: #e84393;
        }

        .tap-hint {
            font-size: 0.7rem;
            color: #e68aaa;
            background: rgba(255,235,240,0.8);
            display: inline-block;
            padding: 6px 14px;
            border-radius: 40px;
            margin-top: 12px;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 16px;
            font-size: 0.8rem;
            background: rgba(255,240,245,0.8);
            border-radius: 50px;
            padding: 6px 12px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #f3b0c2;
            transition: 0.3s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "😊";
            display: flex;
            align-items: center;
            justify-content: center;
            height: 20px;
            width: 20px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
            font-size: 12px;
        }
        input:checked + .slider:before {
            transform: translateX(22px);
            content: "✨";
        }

        /* Canvas для сердечек и звезд */
        #interactiveCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }

        /* Элементы, которые можно лопать (кликабельные сердечки) */
        .pop-heart {
            position: fixed;
            pointer-events: auto;
            cursor: pointer;
            z-index: 25;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            transition: transform 0.05s linear;
        }

        .bg-bubble {
            position: absolute;
            background: radial-gradient(circle, rgba(255,190,210,0.5) 0%, rgba(255,140,170,0.2) 100%);
            border-radius: 50%;
            animation: floatBg 18s infinite linear;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes floatBg {
            0% { transform: translateY(100vh) scale(0.3); opacity: 0; }
            20% { opacity: 0.5; }
            100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
        }

        @media (max-width: 480px) {
            .card {
                padding: 1.5rem 1.2rem;
            }
            .compliment-box {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div id="bgDecor"></div>
    <div class="card" id="mainCard">
        <div class="heart-icon">🌸💕</div>
        <h1>Моей нежности</h1>
        <div class="compliment-box" id="complimentText">
            Ты — мой самый тёплый лучик 💛
        </div>
        <div class="counter">
            💋 поцелуйчиков: <span id="kissCount">0</span>
        </div>
        <div class="toggle-container">
            <span>💖 гироскоп</span>
            <label class="toggle-switch">
                <input type="checkbox" id="gyroToggle">
                <span class="slider"></span>
            </label>
            <span>✨ наклонные сердечки</span>
        </div>
        <div class="tap-hint">
            👆 тапай → летят сердечки + комплимент &nbsp;&nbsp; ✨ води пальцем → звёздный след
        </div>
        <div class="tap-hint" style="margin-top: 6px;">
            🫂 зажми карточку → обнимашки &nbsp;&nbsp; 💖 нажимай на плавающие сердечки — они лопаются!
        </div>
    </div>

    <canvas id="interactiveCanvas"></canvas>
    <div id="popHeartsContainer"></div>

    <script>
        // ---------- ИНТЕРАКТИВ ----------
        let kissCounter = 0;
        const kissCountSpan = document.getElementById('kissCount');
        const complimentDiv = document.getElementById('complimentText');

        const compliments = [
            "Твоя улыбка — как тёплое утро ☀️",
            "Ты делаешь мир цветным 🎨",
            "С тобой даже облака становятся сладкими 🍬",
            "Ты — волшебство, которое я встречаю каждый день ✨",
            "Моё сердце стучит громче, когда ты рядом 💓",
            "Ты пахнешь счастьем 🌸",
            "Ты — лучший сюрприз в моей жизни 🎁",
            "Твои глаза — два океана нежности 🌊",
            "Каждый миг с тобой — маленький праздник 🎉",
            "Ты умеешь согревать одним сообщением 🔥",
            "С тобой я чувствую себя дома 🏡",
            "Ты — моя любимая мелодия 🎶"
        ];

        function updateCompliment() {
            const random = Math.floor(Math.random() * compliments.length);
            complimentDiv.style.transform = 'scale(0.97)';
            setTimeout(() => {
                complimentDiv.innerText = compliments[random];
                complimentDiv.style.transform = '';
            }, 100);
        }

        function addKiss() {
            kissCounter++;
            kissCountSpan.innerText = kissCounter;
            updateCompliment();
            // лёгкая вибрация если есть
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(20);
            }
        }

        // ---------- CANVAS: сердечки и звёздный след ----------
        const canvas = document.getElementById('interactiveCanvas');
        let ctx = canvas.getContext('2d');
        let particles = []; // сердечки и звёзды
        let starsTrail = []; // для следа от пальца

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', () => {
            resizeCanvas();
            resizePopHearts();
        });
        resizeCanvas();

        class HeartParticle {
            constructor(x, y, size, vx, vy, color, type = 'heart') {
                this.x = x;
                this.y = y;
                this.size = size;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.type = type;
                this.life = 1;
                this.decay = 0.018;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.1;
                this.gravity = 0.08;
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.life * 0.85;
                if (this.type === 'heart') {
                    ctx.fillStyle = this.color;
                    ctx.shadowBlur = 6;
                    ctx.shadowColor = "rgba(255, 80, 120, 0.6)";
                    ctx.beginPath();
                    const topCurve = this.size * 0.5;
                    ctx.moveTo(0, topCurve);
                    ctx.bezierCurveTo(-this.size, -this.size * 0.6, -this.size * 0.8, this.size * 0.4, 0, this.size * 0.8);
                    ctx.bezierCurveTo(this.size * 0.8, this.size * 0.4, this.size, -this.size * 0.6, 0, topCurve);
                    ctx.fill();
                } else {
                    // звездочка
                    ctx.fillStyle = `rgba(255, 220, 100, ${0.9 * this.life})`;
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = "gold";
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        const angle = (i * 72 - 90) * Math.PI / 180;
                        const x1 = Math.cos(angle) * this.size;
                        const y1 = Math.sin(angle) * this.size;
                        const x2 = Math.cos(angle + 36 * Math.PI/180) * this.size * 0.45;
                        const y2 = Math.sin(angle + 36 * Math.PI/180) * this.size * 0.45;
                        if (i === 0) ctx.moveTo(x1, y1);
                        else ctx.lineTo(x1, y1);
                        ctx.lineTo(x2, y2);
                    }
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.restore();
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.life -= this.decay;
                this.rotation += this.rotSpeed;
                return this.life > 0 && this.y < canvas.height + 100 && this.x > -200 && this.x < canvas.width + 200;
            }
        }

        function addHeartBurst(x, y, count = 5) {
            for (let i = 0; i < count; i++) {
                const size = Math.random() * 10 + 6;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 2 + 1;
                const vx = Math.cos(angle) * speed * (Math.random() - 0.5);
                const vy = Math.sin(angle) * speed * 1.2 - 1.5;
                const color = `hsl(${340 + Math.random() * 30}, 80%, 65%)`;
                particles.push(new HeartParticle(x, y, size, vx, vy, color, 'heart'));
            }
        }

        function addStarTrail(x, y) {
            const star = new HeartParticle(x, y, Math.random() * 5 + 3, (Math.random() - 0.5) * 1.2, (Math.random() - 1.5) * 1, '#FFD966', 'star');
            star.gravity = 0.02;
            star.decay = 0.03;
            particles.push(star);
        }

        // след пальца/мыши
        let lastX = null, lastY = null;
        function handleMove(e) {
            if (!e.clientX && !e.touches) return;
            let x, y;
            if (e.touches) {
                x = e.touches[0].clientX;
                y = e.touches[0].clientY;
                e.preventDefault();
            } else {
                x = e.clientX;
                y = e.clientY;
            }
            if (lastX !== null) {
                const dist = Math.hypot(x - lastX, y - lastY);
                if (dist > 8) {
                    const steps = Math.min(5, Math.floor(dist / 6));
                    for (let i = 0; i <= steps; i++) {
                        const t = i / steps;
                        const ix = lastX + (x - lastX) * t;
                        const iy = lastY + (y - lastY) * t;
                        addStarTrail(ix, iy);
                    }
                } else {
                    addStarTrail(x, y);
                }
            }
            lastX = x;
            lastY = y;
        }

        function resetMove() {
            lastX = null;
            lastY = null;
        }

        document.body.addEventListener('mousemove', handleMove);
        document.body.addEventListener('touchmove', handleMove, { passive: false });
        document.body.addEventListener('mouseleave', resetMove);
        document.body.addEventListener('touchend', resetMove);
        document.body.addEventListener('touchcancel', resetMove);

        function animateParticles() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                const alive = particles[i].update();
                if (alive) particles[i].draw(ctx);
                else particles.splice(i, 1), i--;
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // ---------- ЛОПАЮЩИЕСЯ ПЛАВАЮЩИЕ СЕРДЕЧКИ (DOM-элементы) ----------
        let floatingHearts = [];
        const popContainer = document.getElementById('popHeartsContainer');

        function createFloatingHeart() {
            const heartDiv = document.createElement('div');
            heartDiv.className = 'pop-heart';
            const size = Math.floor(Math.random() * 28 + 24);
            const leftPos = Math.random() * (window.innerWidth - 60);
            const topPos = Math.random() * (window.innerHeight - 120);
            heartDiv.style.left = leftPos + 'px';
            heartDiv.style.top = topPos + 'px';
            heartDiv.style.width = size + 'px';
            heartDiv.style.height = size + 'px';
            heartDiv.style.fontSize = size + 'px';
            heartDiv.innerHTML = ['❤️','💖','💗','💓','🌸','💕','💘','🩷'][Math.floor(Math.random()*8)];
            heartDiv.style.textAlign = 'center';
            heartDiv.style.lineHeight = size + 'px';
            heartDiv.style.transition = 'all 0.2s ease';
            heartDiv.addEventListener('click', (e) => {
                e.stopPropagation();
                // лопаем: анимация исчезновения + взрыв частиц
                heartDiv.style.transform = 'scale(0)';
                setTimeout(() => {
                    if (heartDiv.parentNode) heartDiv.remove();
                }, 150);
                addHeartBurst(e.clientX, e.clientY, 6);
                addKiss(); // за лопнутое сердечко тоже поцелуйчик!
                floatingHearts = floatingHearts.filter(h => h !== heartDiv);
            });
            popContainer.appendChild(heartDiv);
            floatingHearts.push(heartDiv);
            // через 12 секунд исчезнет само
            setTimeout(() => {
                if (heartDiv.parentNode) {
                    heartDiv.style.opacity = '0';
                    setTimeout(() => heartDiv.remove(), 300);
                    floatingHearts = floatingHearts.filter(h => h !== heartDiv);
                }
            }, 10000);
        }

        function resizePopHearts() {
            floatingHearts.forEach(h => {
                if (h.parentNode) {
                    let left = parseFloat(h.style.left);
                    let top = parseFloat(h.style.top);
                    if (left > window.innerWidth - 50) left = window.innerWidth - 60;
                    if (top > window.innerHeight - 70) top = window.innerHeight - 80;
                    h.style.left = Math.max(10, left) + 'px';
                    h.style.top = Math.max(10, top) + 'px';
                }
            });
        }

        // генерим плавающие сердечки каждые 7 секунд
        setInterval(() => {
            if (floatingHearts.length < 8) createFloatingHeart();
        }, 7000);
        for (let i = 0; i < 3; i++) setTimeout(() => createFloatingHeart(), i * 800);

        // ---------- КЛИК/ТАП по экрану: сердечки + поцелуй ----------
        function onTap(e) {
            let x, y;
            if (e.touches) {
                x = e.touches[0].clientX;
                y = e.touches[0].clientY;
                e.preventDefault();
            } else {
                x = e.clientX;
                y = e.clientY;
            }
            addHeartBurst(x, y, 8);
            addKiss();
        }
        document.body.addEventListener('click', onTap);
        document.body.addEventListener('touchstart', onTap, { passive: false });

        // ---------- ДОЛГОЕ НАЖАТИЕ (обнимашки) ----------
        let longPressTimer = null;
        const card = document.getElementById('mainCard');
        function showHug() {
            const hugDiv = document.createElement('div');
            hugDiv.innerText = '🫂 Обнимаю крепко-крепко! 🫂';
            hugDiv.style.position = 'fixed';
            hugDiv.style.bottom = '30%';
            hugDiv.style.left = '50%';
            hugDiv.style.transform = 'translateX(-50%)';
            hugDiv.style.background = 'rgba(255,215,225,0.95)';
            hugDiv.style.backdropFilter = 'blur(8px)';
            hugDiv.style.padding = '12px 24px';
            hugDiv.style.borderRadius = '60px';
            hugDiv.style.fontWeight = 'bold';
            hugDiv.style.color = '#c93a6b';
            hugDiv.style.fontSize = '1.2rem';
            hugDiv.style.zIndex = '100';
            hugDiv.style.whiteSpace = 'nowrap';
            hugDiv.style.boxShadow = '0 10px 20px rgba(0,0,0,0.2)';
            document.body.appendChild(hugDiv);
            setTimeout(() => hugDiv.remove(), 2000);
            addHeartBurst(window.innerWidth/2, window.innerHeight/2, 12);
            if (window.navigator.vibrate) window.navigator.vibrate(100);
        }
        card.addEventListener('touchstart', (e) => {
            longPressTimer = setTimeout(() => {
                showHug();
                longPressTimer = null;
            }, 500);
        });
        card.addEventListener('touchend', () => {
            if (longPressTimer) clearTimeout(longPressTimer);
        });
        card.addEventListener('mousedown', () => {
            longPressTimer = setTimeout(() => showHug(), 500);
        });
        card.addEventListener('mouseup', () => {
            if (longPressTimer) clearTimeout(longPressTimer);
        });

        // ---------- ГИРОСКОП (наклонные сердечки) ----------
        let gyroActive = false;
        let gyroX = 0, gyroY = 0;
        const toggle = document.getElementById('gyroToggle');
        toggle.addEventListener('change', (e) => {
            gyroActive = e.target.checked;
            if (gyroActive && typeof DeviceOrientationEvent !== 'undefined') {
                if (DeviceOrientationEvent.requestPermission && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    // iOS: просим разрешение при первом клике
                    const requestGyro = () => {
                        DeviceOrientationEvent.requestPermission()
                            .then(permissionState => {
                                if (permissionState === 'granted') {
                                    window.addEventListener('deviceorientation', handleOrientation);
                                }
                            }).catch(console.warn);
                        document.body.removeEventListener('click', requestGyro);
                    };
                    document.body.addEventListener('click', requestGyro);
                    alert("📱 Нажми ещё раз где угодно, чтобы разрешить гироскоп — сердечки будут наклоняться вместе с телефоном!");
                } else {
                    window.addEventListener('deviceorientation', handleOrientation);
                }
            } else if (!gyroActive) {
                window.removeEventListener('deviceorientation', handleOrientation);
                gyroX = 0; gyroY = 0;
            }
        });
        function handleOrientation(event) {
            gyroX = event.gamma;  // -90..90
            gyroY = event.beta;
            // применяем влияние на частицы (добавляем дополнительную силу)
            if (gyroActive) {
                for (let p of particles) {
                    p.vx += gyroX * 0.03;
                    p.vy += gyroY * 0.02;
                    // ограничим скорость
                    if (p.vx > 3) p.vx = 3;
                    if (p.vx < -3) p.vx = -3;
                    if (p.vy > 3) p.vy = 3;
                    if (p.vy < -3) p.vy = -3;
                }
            }
        }

        // фоновые пузырьки
        function createBgBubbles() {
            const container = document.getElementById('bgDecor');
            for (let i = 0; i < 15; i++) {
                const b = document.createElement('div');
                b.classList.add('bg-bubble');
                const sz = Math.random() * 80 + 30;
                b.style.width = sz + 'px';
                b.style.height = sz + 'px';
                b.style.left = Math.random() * 100 + '%';
                b.style.animationDuration = Math.random() * 12 + 8 + 's';
                b.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(b);
            }
        }
        createBgBubbles();

        // приветственный эффект
        setTimeout(() => {
            addHeartBurst(window.innerWidth/2, window.innerHeight/2, 12);
        }, 300);
    </script>
</body>
</html>

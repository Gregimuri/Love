<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Для Карины 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffe9f0 0%, #fcc9d7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            padding: 16px;
            position: relative;
            overflow: hidden;
            touch-action: pan-x pan-y;
        }

        /* Главная карточка */
        .card {
            background: rgba(255, 251, 248, 0.94);
            backdrop-filter: blur(18px);
            border-radius: 56px;
            padding: 1.8rem 1.5rem;
            max-width: 440px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.6);
            transition: transform 0.2s ease;
            animation: gentleFloat 4s infinite ease-in-out;
            z-index: 15;
            position: relative;
        }

        @keyframes gentleFloat {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
            100% { transform: translateY(0px); }
        }

        .heart-icon {
            font-size: 3.8rem;
            display: inline-block;
            animation: pulse 1.4s infinite;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.08));
            margin-bottom: 4px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.06); }
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #d43f6b, #f06a92);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .greeting-name {
            font-size: 1.3rem;
            font-weight: 500;
            color: #e2779a;
            margin-bottom: 12px;
            letter-spacing: -0.2px;
        }

        .compliment-box {
            font-size: 1.15rem;
            line-height: 1.4;
            color: #9b4b6b;
            background: #fff4f8;
            padding: 12px 16px;
            border-radius: 60px;
            margin: 16px 0;
            font-weight: 500;
            transition: all 0.2s ease;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02), 0 2px 6px rgba(0,0,0,0.03);
        }

        .counter {
            background: rgba(255, 220, 230, 0.8);
            border-radius: 40px;
            padding: 6px 16px;
            display: inline-flex;
            align-items: baseline;
            gap: 8px;
            font-weight: 600;
            margin: 8px 0 10px;
            font-size: 1rem;
            color: #b3436b;
        }

        .counter span {
            font-size: 1.7rem;
            font-weight: 800;
            color: #e84393;
        }

        .tap-hint {
            font-size: 0.7rem;
            color: #e68aaa;
            background: rgba(255, 240, 245, 0.8);
            display: inline-block;
            padding: 5px 14px;
            border-radius: 40px;
            margin-top: 8px;
        }

        /* Canvas для эффектов */
        #effectCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }

        /* Плавающие сердечки (кликабельные) */
        .pop-heart {
            position: fixed;
            pointer-events: auto;
            cursor: pointer;
            z-index: 30;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
            transition: transform 0.1s ease;
            will-change: transform;
            padding: 8px;
            margin: -8px;
            background: transparent;
        }
        .pop-heart:active {
            transform: scale(0.85);
        }

        .bg-bubble {
            position: absolute;
            background: radial-gradient(circle, rgba(255, 180, 200, 0.4) 0%, rgba(255, 140, 170, 0.15) 100%);
            border-radius: 50%;
            animation: floatBg 20s infinite linear;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes floatBg {
            0% { transform: translateY(100vh) scale(0.3); opacity: 0; }
            20% { opacity: 0.4; }
            100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
        }

        @media (max-width: 480px) {
            .card {
                padding: 1.4rem 1.2rem;
            }
            .compliment-box {
                font-size: 1rem;
                padding: 10px 12px;
            }
            .greeting-name {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div id="bgDecor"></div>
    <div class="card" id="mainCard">
        <div class="heart-icon">🌸💕</div>
        <h1>Для тебя</h1>
        <div class="greeting-name">✨ Карина ✨</div>
        <div class="compliment-box" id="complimentText">
            Твоя улыбка — как самый тёплый лучик ☀️
        </div>
        <div class="counter">
            💋 поцелуйчиков: <span id="kissCount">0</span>
        </div>
        <div class="tap-hint">
            👆 тапай → сердечки + комплимент &nbsp;&nbsp; ✨ води пальцем → звёздный след
        </div>
        <div class="tap-hint" style="margin-top: 4px;">
            🫂 зажми карточку → обнимашки &nbsp;&nbsp; 💖 нажимай на плавающие сердечки — лопаются!
        </div>
    </div>

    <canvas id="effectCanvas"></canvas>
    <div id="popHeartsContainer"></div>

    <script>
        // ========== ПЕРСОНАЛЬНЫЕ ДАННЫЕ ДЛЯ КАРИНЫ ==========
        let kissCounter = 0;
        const kissCountSpan = document.getElementById('kissCount');
        const complimentDiv = document.getElementById('complimentText');

        // Комплименты с именем Карины
        const compliments = [
            "Карина, ты — моя любимая мелодия 🎶",
            "Твои глаза сияют ярче всех звёзд ✨",
            "Карина, с тобой даже дождь становится уютным ☔️",
            "Ты — волшебство, которое я встречаю каждый день 💖",
            "Карина, ты делаешь мой мир цветным 🎨",
            "Твоя нежность — как самый сладкий пирожное 🍰",
            "Карина, ты пахнешь счастьем 🌸",
            "Ты — лучший сюрприз в моей жизни 🎁",
            "Карина, каждое твоё сообщение — праздник 📱",
            "Ты умеешь согревать одним взглядом 🔥",
            "Карина, с тобой я чувствую себя дома 🏡",
            "Ты — моя любимая сказка 📖",
            "Карина, твой смех — лучшее лекарство 😄",
            "Ты — самая нежная девушка на свете 🥰"
        ];

        function updateCompliment() {
            const random = Math.floor(Math.random() * compliments.length);
            complimentDiv.style.transform = 'scale(0.96)';
            setTimeout(() => {
                complimentDiv.innerText = compliments[random];
                complimentDiv.style.transform = '';
            }, 100);
        }

        function addKiss() {
            kissCounter++;
            kissCountSpan.innerText = kissCounter;
            updateCompliment();
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(15);
            }
        }

        // ========== CANVAS: сердечки и звёздный след ==========
        const canvas = document.getElementById('effectCanvas');
        let ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', () => {
            resizeCanvas();
            repositionFloatingHearts();
        });
        resizeCanvas();

        class Particle {
            constructor(x, y, size, vx, vy, type, color) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.vx = vx;
                this.vy = vy;
                this.type = type; // 'heart' или 'star'
                this.color = color;
                this.life = 1;
                this.decay = 0.018;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.08;
                this.gravity = 0.07;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.life * 0.85;
                ctx.shadowBlur = 4;
                if (this.type === 'heart') {
                    ctx.fillStyle = this.color;
                    ctx.shadowColor = "rgba(255, 80, 120, 0.5)";
                    ctx.beginPath();
                    const top = this.size * 0.5;
                    ctx.moveTo(0, top);
                    ctx.bezierCurveTo(-this.size, -this.size * 0.6, -this.size * 0.8, this.size * 0.4, 0, this.size * 0.8);
                    ctx.bezierCurveTo(this.size * 0.8, this.size * 0.4, this.size, -this.size * 0.6, 0, top);
                    ctx.fill();
                } else {
                    ctx.fillStyle = `rgba(255, 220, 100, ${0.85 * this.life})`;
                    ctx.shadowColor = "rgba(255, 200, 50, 0.5)";
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        const angle = (i * 72 - 90) * Math.PI / 180;
                        const x1 = Math.cos(angle) * this.size;
                        const y1 = Math.sin(angle) * this.size;
                        const x2 = Math.cos(angle + 36 * Math.PI/180) * this.size * 0.45;
                        const y2 = Math.sin(angle + 36 * Math.PI/180) * this.size * 0.45;
                        if (i === 0) ctx.moveTo(x1, y1);
                        else ctx.lineTo(x1, y1);
                        ctx.lineTo(x2, y2);
                    }
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.restore();
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.life -= this.decay;
                this.rotation += this.rotSpeed;
                return this.life > 0 && this.y < canvas.height + 100 && this.x > -150 && this.x < canvas.width + 150;
            }
        }

        function addHeartBurst(x, y, count = 5) {
            for (let i = 0; i < count; i++) {
                const size = Math.random() * 9 + 5;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 2 + 0.8;
                const vx = Math.cos(angle) * speed * (Math.random() - 0.5) * 1.2;
                const vy = Math.sin(angle) * speed * 1.2 - 1.2;
                const hue = 340 + Math.random() * 30;
                const color = `hsl(${hue}, 80%, 65%)`;
                particles.push(new Particle(x, y, size, vx, vy, 'heart', color));
            }
        }

        function addStarTrail(x, y) {
            const size = Math.random() * 4 + 2.5;
            const vx = (Math.random() - 0.5) * 1.2;
            const vy = (Math.random() - 1.2) * 0.8;
            const star = new Particle(x, y, size, vx, vy, 'star', '#FFE484');
            star.gravity = 0.03;
            star.decay = 0.025;
            particles.push(star);
        }

        // След от пальца
        let lastX = null, lastY = null;
        function handleMove(e) {
            let x, y;
            if (e.touches) {
                x = e.touches[0].clientX;
                y = e.touches[0].clientY;
                e.preventDefault();
            } else if (e.clientX) {
                x = e.clientX;
                y = e.clientY;
            } else {
                return;
            }
            if (lastX !== null) {
                const dist = Math.hypot(x - lastX, y - lastY);
                if (dist > 12) {
                    const steps = Math.min(3, Math.floor(dist / 10));
                    for (let i = 0; i <= steps; i++) {
                        const t = i / steps;
                        const ix = lastX + (x - lastX) * t;
                        const iy = lastY + (y - lastY) * t;
                        addStarTrail(ix, iy);
                    }
                } else {
                    addStarTrail(x, y);
                }
            }
            lastX = x;
            lastY = y;
        }

        function resetMove() {
            lastX = null;
            lastY = null;
        }

        document.body.addEventListener('mousemove', handleMove);
        document.body.addEventListener('touchmove', handleMove, { passive: false });
        document.body.addEventListener('mouseleave', resetMove);
        document.body.addEventListener('touchend', resetMove);
        document.body.addEventListener('touchcancel', resetMove);

        function animateParticles() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                const alive = particles[i].update();
                if (alive) particles[i].draw(ctx);
                else particles.splice(i, 1), i--;
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // ========== ПЛАВАЮЩИЕ СЕРДЕЧКИ ==========
        let floatingHearts = [];
        const popContainer = document.getElementById('popHeartsContainer');

        function createFloatingHeart() {
            const heartDiv = document.createElement('div');
            heartDiv.className = 'pop-heart';
            const size = Math.floor(Math.random() * 30 + 26);
            const leftPos = Math.random() * (window.innerWidth - 70);
            const topPos = Math.random() * (window.innerHeight - 100);
            heartDiv.style.left = leftPos + 'px';
            heartDiv.style.top = topPos + 'px';
            heartDiv.style.width = size + 'px';
            heartDiv.style.height = size + 'px';
            heartDiv.style.fontSize = size + 'px';
            heartDiv.style.display = 'flex';
            heartDiv.style.alignItems = 'center';
            heartDiv.style.justifyContent = 'center';
            heartDiv.innerHTML = ['❤️','💖','💗','💓','🌸','💕','💘','🩷'][Math.floor(Math.random()*8)];
            
            const handlePop = (e) => {
                e.stopPropagation();
                e.preventDefault();
                heartDiv.style.transform = 'scale(0)';
                addHeartBurst(e.clientX || (e.touches ? e.touches[0].clientX : 0), 
                               e.clientY || (e.touches ? e.touches[0].clientY : 0), 6);
                addKiss();
                setTimeout(() => {
                    if (heartDiv.parentNode) heartDiv.remove();
                    floatingHearts = floatingHearts.filter(h => h !== heartDiv);
                }, 150);
            };
            
            heartDiv.addEventListener('click', handlePop);
            heartDiv.addEventListener('touchstart', handlePop, { passive: false });
            
            popContainer.appendChild(heartDiv);
            floatingHearts.push(heartDiv);
            
            setTimeout(() => {
                if (heartDiv.parentNode) {
                    heartDiv.style.opacity = '0';
                    setTimeout(() => heartDiv.remove(), 300);
                    floatingHearts = floatingHearts.filter(h => h !== heartDiv);
                }
            }, 12000);
        }

        function repositionFloatingHearts() {
            floatingHearts.forEach(h => {
                if (h.parentNode) {
                    let left = parseFloat(h.style.left);
                    let top = parseFloat(h.style.top);
                    left = Math.min(Math.max(left, 10), window.innerWidth - 70);
                    top = Math.min(Math.max(top, 20), window.innerHeight - 90);
                    h.style.left = left + 'px';
                    h.style.top = top + 'px';
                }
            });
        }

        setInterval(() => {
            if (floatingHearts.length < 6) createFloatingHeart();
        }, 8000);
        setTimeout(() => { for(let i=0;i<3;i++) setTimeout(createFloatingHeart, i*500); }, 500);

        // ========== ТАПЫ ПО ЭКРАНУ ==========
        function onTap(e) {
            let x, y;
            if (e.touches) {
                x = e.touches[0].clientX;
                y = e.touches[0].clientY;
                if (e.cancelable) e.preventDefault();
            } else {
                x = e.clientX;
                y = e.clientY;
            }
            let target = e.target;
            if (target && target.classList && target.classList.contains('pop-heart')) {
                return;
            }
            addHeartBurst(x, y, 6);
            addKiss();
        }
        document.body.addEventListener('click', onTap);
        document.body.addEventListener('touchstart', onTap, { passive: false });

        // ========== ДОЛГОЕ НАЖАТИЕ = обнимашки ==========
        let longPressTimer = null;
        const card = document.getElementById('mainCard');
        function showHug() {
            const hugDiv = document.createElement('div');
            hugDiv.innerText = '🫂 Обнимаю Карину крепко-крепко! 🫂';
            hugDiv.style.position = 'fixed';
            hugDiv.style.bottom = '30%';
            hugDiv.style.left = '50%';
            hugDiv.style.transform = 'translateX(-50%)';
            hugDiv.style.background = 'rgba(255, 215, 225, 0.96)';
            hugDiv.style.backdropFilter = 'blur(12px)';
            hugDiv.style.padding = '12px 24px';
            hugDiv.style.borderRadius = '60px';
            hugDiv.style.fontWeight = 'bold';
            hugDiv.style.color = '#c93a6b';
            hugDiv.style.fontSize = '1.2rem';
            hugDiv.style.zIndex = '100';
            hugDiv.style.whiteSpace = 'nowrap';
            hugDiv.style.boxShadow = '0 10px 20px rgba(0,0,0,0.2)';
            document.body.appendChild(hugDiv);
            setTimeout(() => hugDiv.remove(), 2000);
            addHeartBurst(window.innerWidth/2, window.innerHeight/2, 10);
            if (window.navigator.vibrate) window.navigator.vibrate(80);
        }
        card.addEventListener('touchstart', () => {
            longPressTimer = setTimeout(showHug, 500);
        });
        card.addEventListener('touchend', () => {
            if (longPressTimer) clearTimeout(longPressTimer);
        });
        card.addEventListener('mousedown', () => {
            longPressTimer = setTimeout(showHug, 500);
        });
        card.addEventListener('mouseup', () => {
            if (longPressTimer) clearTimeout(longPressTimer);
        });

        // ========== ФОНОВЫЕ ПУЗЫРЬКИ ==========
        function createBgBubbles() {
            const container = document.getElementById('bgDecor');
            for (let i = 0; i < 12; i++) {
                const b = document.createElement('div');
                b.classList.add('bg-bubble');
                const sz = Math.random() * 70 + 30;
                b.style.width = sz + 'px';
                b.style.height = sz + 'px';
                b.style.left = Math.random() * 100 + '%';
                b.style.animationDuration = Math.random() * 14 + 8 + 's';
                b.style.animationDelay = Math.random() * 12 + 's';
                container.appendChild(b);
            }
        }
        createBgBubbles();

        // Приветственный взрыв
        setTimeout(() => {
            addHeartBurst(window.innerWidth/2, window.innerHeight/2, 12);
        }, 300);
    </script>
</body>
</html>
